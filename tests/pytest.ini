[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require live controller)
    regression: Regression tests (verify previously fixed issues)
    slow: Slow running tests
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
